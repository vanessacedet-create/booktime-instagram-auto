name: Publicar no Instagram

# Disparo manual: aparece um botão "Run workflow" na aba Actions.
# Quando quiser postar, é só clicar lá.
on:
  workflow_dispatch:

# Permissões necessárias pra o bot do Actions conseguir commitar e fazer push
# da pasta movida pra posts/published/.
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          # token padrão do Actions tem permissão pra push graças ao bloco
          # permissions:contents:write acima
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar publicação
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
        run: python scripts/post_to_instagram.py
